# ===============================
# PRODUCTION (Render + PostgreSQL)
# ===============================
server.port=${PORT:8080}
 
spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
 
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# Dialect must be set explicitly so Hibernate doesn't need a live DB connection at startup
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
 
app.jwt.secret=${JWT_SECRET:LostFound@SecureKey#2026VeryStrong123456789}
app.jwt.expiration=86400000
 
app.upload.dir=/tmp/uploads/
 
app.cors.allowed-origins=${CORS_ORIGIN:*}
 
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
 
logging.level.root=WARN
logging.level.com.lostfound=INFO