server.port=${PORT:8081}

# Database — values injected from Render environment variables
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:lost_found_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

app.jwt.secret=${JWT_SECRET:WW91clN1cGVyU2VjcmV0S2V5VGhhdFNob3VsZEJlQXRMZWFzdDI1NkJpdHNMb25nQ2hhbmdlVGhpcw==}
app.jwt.expiration=86400000

app.upload.dir=/tmp/uploads/

app.cors.allowed-origins=${CORS_ORIGIN:http://localhost:3000}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

logging.level.root=WARN
logging.level.com.lostfound=INFO