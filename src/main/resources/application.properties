server.port=${PORT:8080}

spring.datasource.url=${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/lost_found_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

app.jwt.secret=${JWT_SECRET:LostFound@SecureKey#2026VeryStrong123456789}
app.jwt.expiration=86400000

app.cors.allowed-origins=${CORS_ORIGIN:*}

app.upload.dir=/tmp/uploads/
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

logging.level.root=WARN
logging.level.com.lostfound=INFO